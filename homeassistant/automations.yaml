# Meshtastic automations for Home Assistant
# Copy/adapt to your automations.yaml
#
# Requirements:
#   - Meshtastic integration (HACS) connected to node via TCP
#   - rest_command.telegram_notify configured in configuration.yaml
#   - Mosquitto MQTT broker running

# ============================================================
# MESSAGING — Sending via Telegram webhook
# ============================================================

# Receive webhook from Telegram bot and send via Meshtastic
- id: 'mesh_enviar_desde_telegram'
  alias: "Mesh: Send message from Telegram (webhook)"
  description: "Receives webhook from Telegram bot and sends via Meshtastic"
  mode: queued
  trigger:
    - platform: webhook
      webhook_id: mesh_send_from_telegram
      allowed_methods:
        - POST
      local_only: true
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.json.to is defined and trigger.json.to }}"
          sequence:
            - action: meshtastic.send_text
              data:
                text: "{{ trigger.json.message }}"
                to: "{{ trigger.json.to }}"
                ack: true
      default:
        - action: meshtastic.send_text
          data:
            text: "{{ trigger.json.message }}"
            ack: true

# ============================================================
# CHANNEL MESSAGES — Forward to Telegram
# ============================================================

# Forward channel messages (LongFast, private channels, etc.) to Telegram
# Uses meshtastic_api_text_message which fires for all readable text messages
- id: 'mesh_canales_a_telegram'
  alias: "Mesh: channel messages → Telegram"
  description: "Forward Meshtastic channel messages to Telegram"
  mode: queued
  max: 10
  trigger:
    - platform: event
      event_type: meshtastic_api_text_message
  condition:
    - condition: template
      value_template: "{{ trigger.event.data.data.to.channel is not none }}"
  action:
    - action: rest_command.telegram_notify
      data:
        title: "📻 Meshtastic"
        message: >-
          Ch{{ trigger.event.data.data.to.channel }}: {{ trigger.event.data.data.message }}

# ============================================================
# DM DETECTION — Encrypted DMs via meshtastic_api_packet
# ============================================================
#
# Firmware 2.5+ encrypts DMs with PKI end-to-end. The gateway can't decrypt
# them, so events like meshtastic_message_log and meshtastic_api_text_message
# do NOT fire for DMs.
#
# Workaround: meshtastic_api_packet fires for ALL packets including encrypted
# DMs. We detect DMs by checking:
#   - to == YOUR_NODE_ID (not broadcast)
#   - encrypted field is present (PKI payload)
#   - decoded field is absent (not a routing/ack packet)
#
# Limitation: we can detect WHO sent a DM but NOT read the message content.
# See: https://github.com/meshtastic/firmware/issues/5000

# Notify Telegram + flash light when an encrypted DM is received
- id: 'mesh_dm_notify_and_flash'
  alias: "Mesh: DM received → Telegram + 3 blue flashes"
  description: "On encrypted DM received, notify Telegram and flash smart light"
  mode: single
  trigger:
    - platform: event
      event_type: meshtastic_api_packet
  condition:
    - condition: template
      value_template: >
        {{ trigger.event.data.data.to == YOUR_NODE_ID
           and trigger.event.data.data.encrypted is defined
           and trigger.event.data.data.decoded is not defined }}
  action:
    # Notify Telegram (can't read message content, only sender)
    - action: rest_command.telegram_notify
      data:
        title: "📻 DM Meshtastic"
        message: >-
          DM from {{ states("sensor.meshtastic_XXXX_" ~ trigger.event.data.data.from | string ~ "_node_long_name") | default("node " ~ trigger.event.data.data.from) }} (encrypted)
    # Save current light state
    - action: scene.create
      data:
        scene_id: mesh_light_backup
        snapshot_entities:
          - light.YOUR_LIGHT_ENTITY  # Replace with your RGB light entity_id
    # Flash 1
    - action: light.turn_on
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
      data:
        hs_color: [240, 100]
        brightness: 255
    - delay:
        milliseconds: 500
    - action: light.turn_off
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
    - delay:
        milliseconds: 300
    # Flash 2
    - action: light.turn_on
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
      data:
        hs_color: [240, 100]
        brightness: 255
    - delay:
        milliseconds: 500
    - action: light.turn_off
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
    - delay:
        milliseconds: 300
    # Flash 3
    - action: light.turn_on
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
      data:
        hs_color: [240, 100]
        brightness: 255
    - delay:
        milliseconds: 500
    - action: light.turn_off
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
    - delay:
        milliseconds: 500
    # Restore previous state
    - action: scene.turn_on
      target:
        entity_id: scene.mesh_light_backup

# ============================================================
# ALERTS — Node status monitoring
# ============================================================

# Alert if mobile node stops reporting for more than 1 hour
- id: 'mesh_node_offline'
  alias: "Mesh: Mobile node not reporting"
  description: "Alert if mobile node stops reporting for more than 1 hour"
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.meshtastic_XXXX_NODEID_node_last_heard
      to: "unavailable"
      for:
        hours: 1
    - platform: template
      value_template: >
        {{ as_timestamp(now()) - as_timestamp(states('sensor.meshtastic_XXXX_NODEID_node_last_heard')) > 3600 }}
      for:
        minutes: 5
  action:
    - action: rest_command.telegram_notify
      data:
        title: "📡 Mesh offline"
        message: >
          Mobile node not reporting for more than 1 hour.
          Last contact: {{ states('sensor.meshtastic_XXXX_NODEID_node_last_heard') }}
          Battery: {{ states('sensor.meshtastic_XXXX_NODEID_device_battery_level') }}%

# Alert when mobile node battery drops below 20%
- id: 'mesh_node_low_battery'
  alias: "Mesh: Low battery mobile node"
  description: "Alert when battery drops below 20%"
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: sensor.meshtastic_XXXX_NODEID_device_battery_level
      below: 20
  action:
    - action: rest_command.telegram_notify
      data:
        title: "🔋 Mesh low battery"
        message: >
          Mobile node battery at {{ states('sensor.meshtastic_XXXX_NODEID_device_battery_level') }}%
          ({{ states('sensor.meshtastic_XXXX_NODEID_device_voltage') }}V)

# Alert if gateway loses connection
- id: 'mesh_gateway_disconnected'
  alias: "Mesh: Gateway disconnected"
  description: "Alert if Meshtastic gateway loses connection"
  mode: single
  trigger:
    - platform: state
      entity_id: meshtastic.gateway_XXXX
      from: "Connected"
      for:
        minutes: 10
  action:
    - action: rest_command.telegram_notify
      data:
        title: "📡 Mesh gateway offline"
        message: >
          Meshtastic gateway lost connection.
          Status: {{ states('meshtastic.gateway_XXXX') }}
