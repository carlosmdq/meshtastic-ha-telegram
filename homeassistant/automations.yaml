# Meshtastic automations for Home Assistant (MQTT-based)
# All automations use MQTT triggers — no TCP integration required.
# The Meshtastic node publishes to Mosquitto broker, HA subscribes via MQTT integration.
#
# Requirements:
#   - MQTT integration in HA connected to Mosquitto broker
#   - rest_command.telegram_notify configured in configuration.yaml
#   - Meshtastic node with mqtt.enabled=true, json_enabled=true, uplink/downlink enabled
#   - Mosquitto broker running (see ../mosquitto/)
#
# Architecture:
#   App (TCP:4403) → XIAO node → MQTT broker ← HA (MQTT integration)
#   The Meshtastic TCP integration is DISABLED so the app can connect directly.

# ============================================================
# CHANNEL MESSAGES — Forward to Telegram via MQTT
# ============================================================

# Forward channel messages to Telegram
# The gateway node publishes with its own sender ID for all relayed messages,
# so we filter by "from" field (original sender node ID) instead of "sender"
- id: 'mesh_canales_mqtt_telegram'
  alias: "Mesh: canales MQTT → Telegram"
  description: "Forward Meshtastic channel messages via MQTT to Telegram"
  mode: queued
  max: 10
  trigger:
    - platform: mqtt
      topic: "msh/AR/2/json/LongFast/+"
    - platform: mqtt
      topic: "msh/AR/2/json/Limay/+"
    - platform: mqtt
      topic: "msh/AR/2/json/BairesMesh/+"
    - platform: mqtt
      topic: "msh/AR/2/json/NQNmesh/+"
  condition:
    - condition: template
      value_template: >
        {{ (trigger.payload | from_json).type == "text"
           and (trigger.payload | from_json).from != YOUR_NODE_ID }}
  action:
    - action: rest_command.telegram_notify
      data:
        title: "📻 Meshtastic"
        message: >-
          {{ trigger.topic.split("/")[4] }}: {{ (trigger.payload | from_json).payload.text }}
          (de {{ (trigger.payload | from_json).sender }})

# ============================================================
# DM DETECTION — via MQTT
# ============================================================

# DM text messages via MQTT JSON (if decryptable)
- id: 'mesh_dm_mqtt_telegram'
  alias: "Mesh: DM via MQTT → Telegram"
  description: "Detect DMs via MQTT JSON and notify Telegram"
  mode: queued
  max: 5
  trigger:
    - platform: mqtt
      topic: "msh/AR/2/json/+/!YOUR_NODE_HEX"
  condition:
    - condition: template
      value_template: >
        {{ (trigger.payload | from_json).type == "text"
           and (trigger.payload | from_json).to == YOUR_NODE_ID }}
  action:
    - action: rest_command.telegram_notify
      data:
        title: "📻 DM Meshtastic (MQTT)"
        message: >-
          DM de {{ (trigger.payload | from_json).sender }}:
          {{ (trigger.payload | from_json).payload.text | default("(encrypted)") }}

# DM PKI encrypted — detect arrival + flash light
- id: 'mesh_dm_destello_mqtt'
  alias: "Mesh: DM received (MQTT) → flash + Telegram"
  description: "PKI DM detected via MQTT → 3 blue flashes + Telegram notification"
  mode: single
  trigger:
    - platform: mqtt
      topic: "msh/AR/2/e/PKI/+"
  action:
    - action: rest_command.telegram_notify
      data:
        title: "📻 DM Meshtastic"
        message: >-
          DM received from {{ trigger.topic.split("/")[-1] }} (encrypted PKI)
    # Save current light state
    - action: scene.create
      data:
        scene_id: mesh_light_backup
        snapshot_entities:
          - light.YOUR_LIGHT_ENTITY  # Replace with your RGB light entity_id
    # Flash 1
    - action: light.turn_on
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
      data:
        hs_color: [240, 100]
        brightness: 255
    - delay:
        milliseconds: 500
    - action: light.turn_off
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
    - delay:
        milliseconds: 300
    # Flash 2
    - action: light.turn_on
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
      data:
        hs_color: [240, 100]
        brightness: 255
    - delay:
        milliseconds: 500
    - action: light.turn_off
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
    - delay:
        milliseconds: 300
    # Flash 3
    - action: light.turn_on
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
      data:
        hs_color: [240, 100]
        brightness: 255
    - delay:
        milliseconds: 500
    - action: light.turn_off
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
    - delay:
        milliseconds: 500
    # Restore previous state
    - action: scene.turn_on
      target:
        entity_id: scene.mesh_light_backup

# ============================================================
# CHANNEL ALERTS — Visual notification for private channel
# ============================================================

# Flash light on private channel message (e.g., "Limay")
- id: 'mesh_limay_destello_mqtt'
  alias: "Mesh: private channel (MQTT) → 3 blue flashes"
  description: "Flash light on private channel message via MQTT"
  mode: single
  trigger:
    - platform: mqtt
      topic: "msh/AR/2/json/Limay/+"
  condition:
    - condition: template
      value_template: >
        {{ (trigger.payload | from_json).type == "text"
           and (trigger.payload | from_json).from != YOUR_NODE_ID }}
  action:
    - action: scene.create
      data:
        scene_id: mesh_light_backup
        snapshot_entities:
          - light.YOUR_LIGHT_ENTITY
    - action: light.turn_on
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
      data:
        hs_color: [240, 100]
        brightness: 255
    - delay:
        milliseconds: 500
    - action: light.turn_off
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
    - delay:
        milliseconds: 300
    - action: light.turn_on
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
      data:
        hs_color: [240, 100]
        brightness: 255
    - delay:
        milliseconds: 500
    - action: light.turn_off
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
    - delay:
        milliseconds: 300
    - action: light.turn_on
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
      data:
        hs_color: [240, 100]
        brightness: 255
    - delay:
        milliseconds: 500
    - action: light.turn_off
      target:
        entity_id: light.YOUR_LIGHT_ENTITY
    - delay:
        milliseconds: 500
    - action: scene.turn_on
      target:
        entity_id: scene.mesh_light_backup

# ============================================================
# MESSAGING — Send from Telegram via MQTT
# ============================================================

# Receive webhook from Telegram bot and publish to MQTT
- id: 'mesh_enviar_desde_telegram_mqtt'
  alias: "Mesh: Send from Telegram via MQTT"
  description: "Receives webhook from Telegram bot and publishes to MQTT"
  mode: queued
  max: 5
  trigger:
    - platform: webhook
      webhook_id: mesh_send_from_telegram
      allowed_methods:
        - POST
      local_only: true
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.json.channel is defined and trigger.json.channel }}"
          sequence:
            - action: mqtt.publish
              data:
                topic: "msh/AR/2/json/{{ trigger.json.channel }}/!YOUR_NODE_HEX"
                payload: >
                  {{ {"from": YOUR_NODE_ID, "type": "sendtext", "payload": trigger.json.message} | to_json }}
      default:
        - action: mqtt.publish
          data:
            topic: "msh/AR/2/json/LongFast/!YOUR_NODE_HEX"
            payload: >
              {{ {"from": YOUR_NODE_ID, "type": "sendtext", "payload": trigger.json.message} | to_json }}
